# =============================================================================
# Shell & Environment
# =============================================================================
exe_search_path /Users/mike/.local/share/devbox/global/default/.devbox/nix/profile/default/bin
exe_search_path /Users/mike/.local/share/mise/shims
shell /Users/mike/.local/share/mise/installs/aqua-nushell-nushell/0.110.0/nu-0.110.0-aarch64-apple-darwin/nu --login --interactive

# =============================================================================
# Font & Appearance
# =============================================================================
font_family      FiraCode Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 19.0
disable_ligatures always
pixel_scroll yes

# Nerd Font icons — use proportional Symbols font so icons fill their cells
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b5,U+e700-U+e7c5,U+ed00-U+efc1,U+f000-U+f2ff,U+f300-U+f372,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font
# Tame text thickness on macOS (default: platform = 1.7 30)
# Lower gamma = thinner dark-on-light text; lower contrast = less overall boldness
text_composition_strategy 1.0 0
hide_window_decorations yes
window_padding_width 0
background_opacity 1
background_blur 0
cursor_beam_thickness 1.5
cursor_trail 0

# =============================================================================
# Behavior
# =============================================================================
allow_remote_control yes
listen_on unix:/tmp/mykitty
confirm_os_window_close 0
notify_on_cmd_finish invisible 15
scrollback_lines 10000
copy_on_select yes
macos_quit_when_last_window_closed no
enabled_layouts tall, *

# =============================================================================
# Tab Bar
# =============================================================================
tab_bar_style custom
tab_powerline_style angled
tab_separator ""
tab_fade 0 0 0 0
tab_bar_edge top
tab_bar_align left
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
active_tab_font_style normal
inactive_tab_font_style normal
tab_bar_min_tabs 1
tab_activity_symbol none
bell_on_tab no
tab_bar_filter session:~ or session:^$
tab_title_template {title}{' ({})'.format(num_windows) if num_windows > 1 else ''}

# =============================================================================
# Color Scheme: rootbeet (generated by rootbeet.build.kitty())
# =============================================================================
include ../rootbeet-theme/kitty/rootbeet.conf

# =============================================================================
# Keybindings
# =============================================================================
clear_all_shortcuts yes

map cmd+v paste_selection_or_clipboard
map cmd+c copy_to_clipboard
mouse_map middle release ungrabbed paste_selection_or_clipboard

map cmd+t>n neighboring_window left
map cmd+t>i neighboring_window right
map cmd+t>e neighboring_window down
map cmd+t>u neighboring_window up

map cmd+shift+n neighboring_window left
map cmd+shift+i neighboring_window right
map cmd+shift+e neighboring_window down
map cmd+shift+u neighboring_window up

# Smart splits: when neovim is focused, unset the neighboring_window binding so
# cmd+shift+n/i/e/u pass through as kitty keyboard protocol sequences to neovim
map --when-focus-on var:IS_NVIM cmd+shift+n
map --when-focus-on var:IS_NVIM cmd+shift+i
map --when-focus-on var:IS_NVIM cmd+shift+e
map --when-focus-on var:IS_NVIM cmd+shift+u

# Resize splits via cmd+shift+t > arrow (kitty panes when not in neovim)
map cmd+shift+t>left  kitten relative_resize.py left  8
map cmd+shift+t>right kitten relative_resize.py right 8
map cmd+shift+t>up    kitten relative_resize.py up    8
map cmd+shift+t>down  kitten relative_resize.py down  8

# When neovim is focused, pass cmd+shift+t through so nvim enters its resize mode
map --when-focus-on var:IS_NVIM cmd+shift+t

map cmd+t>w next_window
map cmd+u next_tab
map cmd+n previous_tab
map cmd+t>l next_layout
map cmd+t>f select_tab

# Session management (native kitty sessions)
map cmd+t>e launch --type=overlay /bin/bash ~/.config/kitty/session_select.sh
map cmd+w goto_session -1
map cmd+t>shift+w goto_session
map cmd+t>Y close_session

map cmd+shift+l toggle_layout stack
map cmd+t>y close_window
map cmd+t>t clear_terminal scroll active
map cmd+t>shift+r load_config_file

map cmd+g launch --type=overlay --cwd=current lazygit
map cmd+t>o launch --type=tab --cwd=current
map cmd+t>R launch --type=overlay --cwd=current "kitten @ action set_tab_title"
map cmd+t>h launch --type=window --cwd=current
map cmd+t>shift+e launch --stdin-source=@screen_scrollback ~/programs/neovim/out/bin/nvim

map cmd+shift+equal change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+equal change_font_size all +1.0
map cmd+shift+minus change_font_size all -1.0
map cmd+t>shift+. change_font_size all +1.0
map cmd+t>shift+, change_font_size all -1.0

map cmd+shift+. change_font_size all +1.0
map cmd+shift+, change_font_size all -1.0
