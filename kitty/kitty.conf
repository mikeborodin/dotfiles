# =============================================================================
# Shell & Environment
# =============================================================================
exe_search_path /Users/mike/.local/share/devbox/global/default/.devbox/nix/profile/default/bin
exe_search_path /Users/mike/.local/share/mise/shims
shell /Users/mike/.local/share/mise/installs/aqua-nushell-nushell/0.110.0/nu-0.110.0-aarch64-apple-darwin/nu --login --interactive

# =============================================================================
# Font & Appearance
# =============================================================================
font_size 16.0
disable_ligatures always
hide_window_decorations yes
window_padding_width 0
background_opacity 1
background_blur 0
cursor_beam_thickness 1.5
cursor_trail 0

# =============================================================================
# Behavior
# =============================================================================
confirm_os_window_close 0
notify_on_cmd_finish invisible 15
scrollback_lines 10000
copy_on_select yes
macos_quit_when_last_window_closed no
enabled_layouts tall, *

# =============================================================================
# Tab Bar
# =============================================================================
tab_bar_style custom
tab_powerline_style slanted
tab_separator ""
tab_fade 0 0 0 0
tab_bar_edge top
tab_bar_align left
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
active_tab_font_style normal
inactive_tab_font_style normal
tab_bar_min_tabs 1
tab_activity_symbol none
bell_on_tab no
tab_title_template {title}{' ({})'.format(num_windows) if num_windows > 1 else ''}

# =============================================================================
# Color Scheme: Catppuccin Macchiato
# =============================================================================
# vim:ft=kitty
# name: Catppuccin Macchiato
# author: Catppuccin Org
# license: MIT
# upstream: https://github.com/catppuccin/kitty/blob/main/themes/macchiato.conf
foreground              #cad3f5
background              #24273a
selection_foreground    #24273a
selection_background    #f4dbd6
cursor                  #f4dbd6
cursor_text_color       #24273a
url_color               #f4dbd6

# Tab bar colors (matching Wezterm)
active_tab_foreground   #ffffff
active_tab_background   #383d6d
inactive_tab_foreground #808080
inactive_tab_background #191f26
tab_bar_background      #181926

# Window border colors
active_border_color     #b7bdf8
inactive_border_color   #6e738d
bell_border_color       #eed49f

# black
color0  #494d64
color8  #5b6078

# red
color1  #ed8796
color9  #ed8796

# green
color2  #a6da95
color10 #a6da95

# yellow
color3  #eed49f
color11 #eed49f

# blue
color4  #8aadf4
color12 #8aadf4

# magenta
color5  #f5bde6
color13 #f5bde6

# cyan
color6  #8bd5ca
color14 #8bd5ca

# white
color7  #b8c0e0
color15 #a5adcb

# =============================================================================
# Keybindings
# =============================================================================
clear_all_shortcuts yes

map cmd+v paste_selection_or_clipboard
map cmd+c copy_to_clipboard
mouse_map middle release ungrabbed paste_selection_or_clipboard

map cmd+t>n neighboring_window left
map cmd+t>i neighboring_window right
map cmd+t>e neighboring_window down
map cmd+t>u neighboring_window up

map cmd+shift+n neighboring_window left
map cmd+shift+i neighboring_window right
map cmd+shift+e neighboring_window down
map cmd+shift+u neighboring_window up

map cmd+w next_window
map cmd+u next_tab
map cmd+n previous_tab
map cmd+t>l next_layout
map cmd+t>f select_tab

map cmd+shift+l toggle_layout stack
map cmd+t>y close_window
map cmd+t>t clear_terminal scroll active
map cmd+t>shift+r load_config_file

map cmd+g launch --type=overlay --cwd=current lazygit
map cmd+t>o launch --type=tab --cwd=current
map cmd+t>R launch --type=overlay --cwd=current "kitten @ action set_tab_title"
map cmd+t>h launch --type=window --cwd=current
map cmd+t>shift+e launch --stdin-source=@screen_scrollback nvim
